name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "backend/**"
      - "src/**"
      - "eslint.config.js"
      - "index.html"
      - "package-lock.json"
      - "package.json"
      - "tsconfig.app.json"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - "vite.config.ts"
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: all
        type: choice
        options:
          - all
          - frontend
          - backend

permissions:
  contents: read
  id-token: write

jobs:
  changes:
    name: Detect Deploy Targets
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'frontend') && 'true' || github.event_name == 'workflow_dispatch' && 'false' || steps.filter.outputs.frontend }}
      backend: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'backend') && 'true' || github.event_name == 'workflow_dispatch' && 'false' || steps.filter.outputs.backend }}
    steps:
      - name: Checkout code
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        if: github.event_name == 'push'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          filters: |
            frontend:
              - '.github/workflows/deploy.yml'
              - 'src/**'
              - 'eslint.config.js'
              - 'index.html'
              - 'package-lock.json'
              - 'package.json'
              - 'tsconfig.app.json'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'vite.config.ts'
            backend:
              - '.github/workflows/deploy.yml'
              - 'backend/**'

  deploy-backend:
    name: Build & Deploy Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: us-east-2
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ECR_BACKEND_REPOSITORY: flowfox
      ECS_CLUSTER_NAME: flowfox-cluster
      ECS_BACKEND_SERVICE: API
      ECS_TASK_FAMILY: flowfox-api
      ECS_CONTAINER_NAME: flowfox-api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate AWS auth configuration
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$AWS_ROLE_ARN" ]]; then
            echo "::error::Missing AWS_ROLE_ARN. OIDC is required by this workflow."
            exit 1
          fi

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set backend image URI
        id: backend-image
        shell: bash
        run: |
          set -euo pipefail
          echo "image=${{ steps.login-ecr.outputs.registry }}/${ECR_BACKEND_REPOSITORY}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.backend-image.outputs.image }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_BACKEND_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render Amazon ECS task definition
        id: taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: ${{ env.ECS_TASK_FAMILY }}
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ steps.backend-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.taskdef.outputs.task-definition }}
          service: ${{ env.ECS_BACKEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER_NAME }}
          wait-for-service-stability: true
          wait-max-delay-seconds: 15

  deploy-frontend:
    name: Build & Deploy Frontend
    needs:
      - changes
      - deploy-backend
    if: ${{ always() && needs.changes.outputs.frontend == 'true' && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: us-east-2
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      CF_DIST_ID: EFFBYWJSMTVJS
      S3_CDN_BUCKET: cdn-flowfox
      VITE_API_BASE_URL: https://api.flowfox.dev
      VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout frontend files
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            public
            src
            index.html
            package-lock.json
            package.json
            tsconfig.app.json
            tsconfig.json
            tsconfig.node.json
            vite.config.ts
          sparse-checkout-cone-mode: false

      - name: Validate AWS auth configuration
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$AWS_ROLE_ARN" ]]; then
            echo "::error::Missing AWS_ROLE_ARN. OIDC is required by this workflow."
            exit 1
          fi

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate frontend configuration
        shell: bash
        run: |
          set -euo pipefail

          required_vars=(
            VITE_CLERK_PUBLISHABLE_KEY
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "::error::Missing required GitHub variable: $var_name"
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: ${{ env.VITE_API_BASE_URL }}
        run: npm run build

      - name: Upload assets to S3
        run: aws s3 sync dist "s3://$S3_CDN_BUCKET" --delete --exclude "index.html" --cache-control "public,max-age=31536000,immutable"

      - name: Upload HTML shell
        run: aws s3 cp dist/index.html "s3://$S3_CDN_BUCKET/index.html" --cache-control "no-cache"

      - name: Invalidate CloudFront paths
        run: aws cloudfront create-invalidation --distribution-id "$CF_DIST_ID" --paths "/*"
